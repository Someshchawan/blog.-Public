<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="author" content="{{ site.author.name }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-logo">Somesh Chawan</a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Blog</a>
        <a href="{{ '/about' | relative_url }}">About</a>
        <a href="https://someshchawan.github.io/ai-support-copilot-docs/" target="_blank">Docs Site</a>
        <a href="https://github.com/Someshchawan" target="_blank">GitHub</a>
      </div>
    </div>
  </nav>

  <main class="main">
    {{ content }}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>Somesh Chawan &middot; Developer Experience &middot; Technical Documentation &middot; AI Systems</p>
      <p class="footer-links">
        <a href="https://linkedin.com/in/somesh-chawan-b29144148">LinkedIn</a> &middot;
        <a href="https://github.com/Someshchawan">GitHub</a> &middot;
        <a href="https://someshchawan.github.io/ai-support-copilot-docs/">Documentation Site</a>
      </p>
    </div>
  </footer>
</body>
</html>
